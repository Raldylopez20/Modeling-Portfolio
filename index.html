<!-- Script de Fancybox para galería lightbox -->
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
<script>
  // Lazy Loading para mejorar rendimiento
  document.addEventListener('DOMContentLoaded', function() {
    const images = document.querySelectorAll('img[data-src]');
    
    const imageObserver = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          img.src = img.dataset.src;
          img.classList.remove('lazy');
          img.classList.add('loaded');
          observer.unobserve(img);
        }
      });
    }, {
      rootMargin: '50px 0px',
      threshold: 0.01
    });
    
    images.forEach(img => imageObserver.observe(img));
  });

  // Configuración de Fancybox optimizada
  Fancybox.bind("[data-fancybox]", {
    // Miniaturas activadas automáticamente
    Thumbs: {
      autoStart: true,
    },
    // Barra de herramientas con más botones
    Toolbar: {
      display: {
        left: ["infobar"],
        middle: ["zoomIn", "zoomOut", "toggle1to1"],
        right: ["slideshow", "fullscreen", "download", "thumbs", "close"],
      },
    },
    // Optimización de rendimiento
    preload: 2,
    wheel: "zoom",
    click: "toggleZoom"
  });

  // Optimización del scroll
  let scrollTimeout;
  window.addEventListener('scroll', function() {
    if (scrollTimeout) {
      window.cancelAnimationFrame(scrollTimeout);
    }
    
    scrollTimeout = window.requestAnimationFrame(function() {
      // Scroll optimizado
    });
  }, { passive: true });
</script>

    navLinks.classList.toggle('active'); // Muestra u oculta el menú
